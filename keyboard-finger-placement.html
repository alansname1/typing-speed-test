<h1>Keyboard Finger Placement</h1>

<p>Correct finger placement helps improve typing speed and accuracy.</p>

<h2>Home Row Keys</h2>

<p>Your fingers should rest on these keys:</p>

<ul>
<li>Left hand: A S D F</li>
<li>Right hand: J K L ;</li>
</ul>

<p>Your index fingers rest on F and J.</p>
